<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 400m Times</title>
    <link rel="stylesheet" href="index.css">
    <style>
        body {
            font-family: sans-serif;
            max-width: 500px;
            margin: 2rem auto;
            padding: 0 1rem;
            background-image:url(BG.jpg);
            background-size: cover;
            background-attachment: fixed;
            
        }


    </style>
</head>

<body>

    <h2>Top Times (400m)</h2>
    <div id="leaderboard">Loading Times...</div>

    <div class="form-group">
        <h3>Submit Your Time</h3>
        <input type="text" id="nameInput" placeholder=" Name" required>
        <input type="number" id="scoreInput" placeholder="Time (seconds)" required>
        <button onclick="submitScore()">Submit</button>
    </div>

    <!-- Firebase SDK (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import {
            getAnalytics,
        } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";
        import {
            getFirestore,
            collection,
            addDoc,
            query,
            orderBy,
            limit,
            onSnapshot
        } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
        // TODO: Replace with your own Firebase SDK configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDBKLF6jVrH-XJVKilntgGAQw9LRT7Rov0",
            authDomain: "dashboard-900fb.firebaseapp.com",
            projectId: "dashboard-900fb",
            storageBucket: "dashboard-900fb.firebasestorage.app",
            messagingSenderId: "246505983141",
            appId: "1:246505983141:web:ad2b32e63076f7e446914c",
            measurementId: "G-P0PV45NGPT"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Fetch & display leaderboard in real-time
        const q = query(collection(db, "scores"), orderBy("score", "asc"), limit(10));
        onSnapshot(q, (snapshot) => {
            const leaderboardDiv = document.getElementById("leaderboard");
            leaderboardDiv.innerHTML = ""; // Clear current list

            let rank = 1;
            snapshot.forEach((doc) => {
                const data = doc.data();
                leaderboardDiv.innerHTML += `
                    <div class="leaderboard-item">
                        <strong>#${rank} - ${data.name}</strong>
                        <span>${data.score}</span>
                    </div>
                `;
                rank++;
            });
        });

        // Submit new score to database
        window.submitScore = async function () {
            const name = document.getElementById("nameInput").value;
            const score = parseInt(document.getElementById("scoreInput").value);

            if (!name || isNaN(score)) {
                alert("Please enter a valid name and score.");
                return;
            }

            try {
                await addDoc(collection(db, "scores"), {
                    name: name,
                    score: score,
                    timestamp: Date.now()
                });
                document.getElementById("scoreInput").value = ""; // Reset form
            } catch (e) {
                console.error("Error adding document: ", e);
            }
        };
    </script>
</body>

</html>
